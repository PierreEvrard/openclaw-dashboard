<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kreator Dashboard — Pierre x Jules</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    /* ── Reset & Base ───────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #0a0b14;
      --bg2:          #0f1021;
      --bg3:          #141628;
      --surface:      rgba(255,255,255,0.04);
      --surface-hover:rgba(255,255,255,0.07);
      --border:       rgba(255,255,255,0.07);
      --border-bright:rgba(255,255,255,0.13);

      --violet:       #7c3aed;
      --violet-light: #a78bfa;
      --violet-glow:  rgba(124,58,237,0.35);
      --blue:         #2563eb;
      --blue-light:   #60a5fa;
      --blue-glow:    rgba(37,99,235,0.30);
      --cyan:         #06b6d4;
      --cyan-glow:    rgba(6,182,212,0.25);

      --green:        #10b981;
      --green-glow:   rgba(16,185,129,0.25);
      --amber:        #f59e0b;
      --amber-glow:   rgba(245,158,11,0.25);
      --red:          #ef4444;

      --text:         #e2e8f0;
      --text-muted:   #64748b;
      --text-dim:     #94a3b8;

      --radius:       14px;
      --radius-sm:    8px;
      --radius-lg:    20px;
      --shadow:       0 8px 32px rgba(0,0,0,0.5);
      --transition:   0.2s cubic-bezier(0.4,0,0.2,1);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* background grid pattern */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(124,58,237,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(124,58,237,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    /* ambient glows */
    body::after {
      content: '';
      position: fixed;
      top: -200px;
      left: -200px;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(124,58,237,0.12) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .glow-right {
      position: fixed;
      bottom: -200px;
      right: -200px;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(37,99,235,0.10) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    main { position: relative; z-index: 1; }

    /* ── Header ─────────────────────────────────────────────────── */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(10,11,20,0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
    }

    .header-inner {
      max-width: 1280px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 16px 0;
      flex-wrap: wrap;
    }

    .header-brand {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .brand-logo {
      width: 42px;
      height: 42px;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--violet) 0%, var(--blue) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      box-shadow: 0 0 20px var(--violet-glow);
      flex-shrink: 0;
    }

    .brand-text h1 {
      font-size: 18px;
      font-weight: 700;
      background: linear-gradient(90deg, var(--violet-light), var(--blue-light));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.2;
    }

    .brand-text .project-date {
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 400;
    }

    .header-stats {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .stat-pill {
      display: flex;
      align-items: center;
      gap: 7px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 50px;
      padding: 6px 14px;
      font-size: 13px;
      font-weight: 500;
      white-space: nowrap;
      transition: var(--transition);
    }

    .stat-pill:hover { background: var(--surface-hover); border-color: var(--border-bright); }

    .stat-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .dot-total  { background: var(--text-muted); }
    .dot-active { background: var(--violet-light); box-shadow: 0 0 6px var(--violet-glow); }
    .dot-done   { background: var(--green); box-shadow: 0 0 6px var(--green-glow); }

    .completion-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 50px;
      padding: 6px 14px;
      font-size: 13px;
      font-weight: 500;
    }

    .bar-track {
      width: 80px;
      height: 5px;
      background: rgba(255,255,255,0.08);
      border-radius: 99px;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      border-radius: 99px;
      background: linear-gradient(90deg, var(--violet), var(--blue-light));
      transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
      box-shadow: 0 0 8px var(--violet-glow);
    }

    .header-actions {
      display: flex;
      gap: 8px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border: none;
      border-radius: var(--radius-sm);
      padding: 8px 14px;
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: var(--transition);
      white-space: nowrap;
    }

    .btn-ghost {
      background: var(--surface);
      color: var(--text-dim);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover { background: var(--surface-hover); color: var(--text); border-color: var(--border-bright); }

    .btn-primary {
      background: linear-gradient(135deg, var(--violet) 0%, var(--blue) 100%);
      color: #fff;
      box-shadow: 0 4px 16px var(--violet-glow);
    }
    .btn-primary:hover { opacity: 0.88; transform: translateY(-1px); box-shadow: 0 6px 20px var(--violet-glow); }

    /* ── Layout ─────────────────────────────────────────────────── */
    .container {
      max-width: 1280px;
      margin: 0 auto;
      padding: 32px 24px;
    }

    .columns {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      margin-bottom: 32px;
    }

    @media (max-width: 768px) {
      .columns { grid-template-columns: 1fr; }
      .header-stats { display: none; }
    }

    /* ── Column Card ────────────────────────────────────────────── */
    .col-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
      transition: var(--transition);
    }

    .col-header {
      padding: 20px 24px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .col-header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .col-avatar {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .col-avatar.jules {
      background: linear-gradient(135deg, rgba(124,58,237,0.3), rgba(37,99,235,0.3));
      border: 1px solid rgba(124,58,237,0.4);
      box-shadow: 0 0 16px var(--violet-glow);
    }

    .col-avatar.pierre {
      background: linear-gradient(135deg, rgba(6,182,212,0.25), rgba(16,185,129,0.25));
      border: 1px solid rgba(6,182,212,0.35);
      box-shadow: 0 0 16px var(--cyan-glow);
    }

    .col-title {
      font-size: 16px;
      font-weight: 700;
    }

    .col-title.jules { color: var(--violet-light); }
    .col-title.pierre { color: var(--cyan); }

    .col-subtitle {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 1px;
    }

    .col-count {
      font-size: 12px;
      font-weight: 600;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 50px;
      padding: 3px 10px;
      color: var(--text-dim);
    }

    .col-body { padding: 16px; display: flex; flex-direction: column; gap: 12px; }

    /* ── Task Card ──────────────────────────────────────────────── */
    .task-card {
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      transition: var(--transition);
      position: relative;
      overflow: hidden;
    }

    .task-card::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      border-radius: 3px 0 0 3px;
    }

    .task-card.status-done::before   { background: var(--green); }
    .task-card.status-active::before { background: var(--violet-light); }
    .task-card.status-pending::before{ background: var(--amber); }

    .task-card:hover {
      background: rgba(255,255,255,0.055);
      border-color: var(--border-bright);
      transform: translateY(-1px);
      box-shadow: var(--shadow);
    }

    .task-card.status-done { opacity: 0.72; }
    .task-card.status-done:hover { opacity: 1; }

    .task-top {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 6px;
    }

    .task-checkbox {
      width: 18px;
      height: 18px;
      border-radius: 5px;
      border: 1.5px solid var(--border-bright);
      background: transparent;
      cursor: pointer;
      appearance: none;
      -webkit-appearance: none;
      flex-shrink: 0;
      margin-top: 2px;
      transition: var(--transition);
      position: relative;
    }

    .task-checkbox:checked {
      background: var(--green);
      border-color: var(--green);
    }

    .task-checkbox:checked::after {
      content: '';
      position: absolute;
      left: 4px; top: 1px;
      width: 5px; height: 9px;
      border: 2px solid #fff;
      border-top: none;
      border-left: none;
      transform: rotate(45deg);
    }

    .task-checkbox:hover:not(:checked) { border-color: var(--green); }

    .task-info { flex: 1; min-width: 0; }

    .task-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      line-height: 1.4;
    }

    .task-card.status-done .task-title { text-decoration: line-through; color: var(--text-muted); }

    .task-desc {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 3px;
      line-height: 1.5;
    }

    .task-footer {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 10px;
      flex-wrap: wrap;
    }

    .task-status {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      font-weight: 600;
      border-radius: 50px;
      padding: 3px 9px;
      letter-spacing: 0.02em;
    }

    .task-status.done    { background: rgba(16,185,129,0.12); color: var(--green); border: 1px solid rgba(16,185,129,0.25); }
    .task-status.active  { background: rgba(124,58,237,0.12); color: var(--violet-light); border: 1px solid rgba(124,58,237,0.25); }
    .task-status.pending { background: rgba(245,158,11,0.10); color: var(--amber); border: 1px solid rgba(245,158,11,0.22); }

    .pulse-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--violet-light);
      animation: pulse 1.8s ease-in-out infinite;
      flex-shrink: 0;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); box-shadow: 0 0 0 0 var(--violet-glow); }
      50%       { opacity: 0.7; transform: scale(1.3); box-shadow: 0 0 0 4px transparent; }
    }

    .task-priority {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      border-radius: 4px;
      padding: 2px 6px;
    }

    .priority-high   { background: rgba(239,68,68,0.12); color: var(--red); border: 1px solid rgba(239,68,68,0.2); }
    .priority-medium { background: rgba(245,158,11,0.10); color: var(--amber); border: 1px solid rgba(245,158,11,0.2); }
    .priority-low    { background: rgba(100,116,139,0.12); color: var(--text-muted); border: 1px solid rgba(100,116,139,0.2); }

    .task-date {
      font-size: 11px;
      color: var(--text-muted);
      margin-left: auto;
    }

    /* ── Add task form ──────────────────────────────────────────── */
    .add-task-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      width: 100%;
      background: transparent;
      border: 1.5px dashed var(--border);
      border-radius: var(--radius);
      padding: 12px 16px;
      color: var(--text-muted);
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: var(--transition);
      text-align: left;
    }

    .add-task-btn:hover {
      background: var(--surface);
      border-color: var(--violet);
      color: var(--violet-light);
    }

    .add-task-form {
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border-bright);
      border-radius: var(--radius);
      padding: 16px;
      display: none;
      flex-direction: column;
      gap: 10px;
      animation: fadeIn 0.2s ease;
    }

    .add-task-form.open { display: flex; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .form-input {
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 9px 12px;
      font-family: inherit;
      font-size: 13px;
      color: var(--text);
      width: 100%;
      transition: var(--transition);
      outline: none;
    }

    .form-input::placeholder { color: var(--text-muted); }
    .form-input:focus { border-color: rgba(124,58,237,0.5); background: rgba(255,255,255,0.06); box-shadow: 0 0 0 3px rgba(124,58,237,0.1); }

    .form-row { display: flex; gap: 8px; }

    .form-select {
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 9px 12px;
      font-family: inherit;
      font-size: 13px;
      color: var(--text);
      flex: 1;
      cursor: pointer;
      outline: none;
      transition: var(--transition);
    }

    .form-select option { background: #1a1b2e; color: var(--text); }
    .form-select:focus { border-color: rgba(124,58,237,0.5); }

    .form-actions { display: flex; gap: 8px; justify-content: flex-end; }

    /* ── Timeline ───────────────────────────────────────────────── */
    .timeline-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
    }

    .timeline-header {
      padding: 20px 24px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .timeline-title {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 15px;
      font-weight: 700;
    }

    .timeline-icon {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: linear-gradient(135deg, rgba(6,182,212,0.2), rgba(37,99,235,0.2));
      border: 1px solid rgba(6,182,212,0.25);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
    }

    .timeline-body {
      padding: 16px 24px;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .log-entry {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
      animation: slideIn 0.3s ease;
    }

    .log-entry:last-child { border-bottom: none; }

    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-8px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    .log-avatar {
      width: 28px;
      height: 28px;
      border-radius: 7px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      flex-shrink: 0;
      margin-top: 1px;
    }

    .log-avatar.jules  { background: rgba(124,58,237,0.2); border: 1px solid rgba(124,58,237,0.3); }
    .log-avatar.pierre { background: rgba(6,182,212,0.15); border: 1px solid rgba(6,182,212,0.25); }
    .log-avatar.system { background: rgba(100,116,139,0.15); border: 1px solid rgba(100,116,139,0.2); }

    .log-content { flex: 1; min-width: 0; }

    .log-text {
      font-size: 13px;
      color: var(--text-dim);
      line-height: 1.5;
    }

    .log-text strong { color: var(--text); font-weight: 600; }
    .log-text .tag-jules { color: var(--violet-light); }
    .log-text .tag-pierre { color: var(--cyan); }

    .log-time {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    /* ── Empty state ────────────────────────────────────────────── */
    .empty-state {
      text-align: center;
      padding: 32px 16px;
      color: var(--text-muted);
      font-size: 13px;
    }

    .empty-state .icon { font-size: 28px; margin-bottom: 8px; }

    /* ── Toast ──────────────────────────────────────────────────── */
    #toast-container {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .toast {
      background: rgba(15,16,33,0.95);
      border: 1px solid var(--border-bright);
      border-radius: var(--radius-sm);
      padding: 10px 16px;
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      backdrop-filter: blur(12px);
      box-shadow: var(--shadow);
      animation: toastIn 0.3s ease;
      max-width: 300px;
    }

    @keyframes toastIn {
      from { opacity: 0; transform: translateX(16px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    /* ── Modal (import) ─────────────────────────────────────────── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(4px);
      z-index: 500;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .modal-overlay.open { display: flex; }

    .modal {
      background: var(--bg2);
      border: 1px solid var(--border-bright);
      border-radius: var(--radius-lg);
      padding: 28px;
      width: 100%;
      max-width: 480px;
      box-shadow: var(--shadow);
      animation: fadeIn 0.25s ease;
    }

    .modal h3 { font-size: 16px; font-weight: 700; margin-bottom: 12px; }

    .modal textarea {
      width: 100%;
      height: 160px;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px 12px;
      font-family: 'Inter', monospace;
      font-size: 12px;
      color: var(--text-dim);
      resize: vertical;
      outline: none;
      margin-bottom: 14px;
    }

    .modal textarea:focus { border-color: rgba(124,58,237,0.5); }
    .modal-actions { display: flex; gap: 8px; justify-content: flex-end; }

    /* ── Scrollbar ──────────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.18); }
  </style>
</head>
<body>
<div class="glow-right"></div>

<!-- ── Header ─────────────────────────────────────────────────── -->
<header>
  <div class="header-inner">
    <div class="header-brand">
      <div class="brand-logo">⚡</div>
      <div class="brand-text">
        <h1 id="project-name">Kreator — Bootcamp Launch</h1>
        <div class="project-date" id="today-date"></div>
      </div>
    </div>

    <div class="header-stats">
      <div class="stat-pill">
        <div class="stat-dot dot-total"></div>
        <span id="stat-total">0</span> tâches
      </div>
      <div class="stat-pill">
        <div class="stat-dot dot-active"></div>
        <span id="stat-active">0</span> en cours
      </div>
      <div class="stat-pill">
        <div class="stat-dot dot-done"></div>
        <span id="stat-done">0</span> terminées
      </div>
      <div class="completion-bar">
        <div class="bar-track">
          <div class="bar-fill" id="progress-bar" style="width:0%"></div>
        </div>
        <span id="stat-percent">0%</span>
      </div>
    </div>

    <div class="header-actions">
      <button class="btn btn-ghost" onclick="exportJSON()">⬇ Export</button>
      <button class="btn btn-ghost" onclick="openImport()">⬆ Import</button>
    </div>
  </div>
</header>

<main>
  <div class="container">
    <!-- ── 2 Columns ─────────────────────────────────────────── -->
    <div class="columns">

      <!-- Jules Column -->
      <div class="col-card">
        <div class="col-header">
          <div class="col-header-left">
            <div class="col-avatar jules">⚡</div>
            <div>
              <div class="col-title jules">Jules — IA</div>
              <div class="col-subtitle">Tâches gérées automatiquement</div>
            </div>
          </div>
          <div class="col-count" id="jules-count">0 tâches</div>
        </div>
        <div class="col-body" id="jules-tasks"></div>
      </div>

      <!-- Pierre Column -->
      <div class="col-card">
        <div class="col-header">
          <div class="col-header-left">
            <div class="col-avatar pierre">👤</div>
            <div>
              <div class="col-title pierre">Pierre — Humain</div>
              <div class="col-subtitle">Tes actions en attente</div>
            </div>
          </div>
          <div class="col-count" id="pierre-count">0 tâches</div>
        </div>
        <div class="col-body" id="pierre-tasks">
          <button class="add-task-btn" onclick="toggleAddForm()">
            <span style="font-size:16px">＋</span> Ajouter une tâche
          </button>
          <div class="add-task-form" id="add-task-form">
            <input class="form-input" type="text" id="new-task-title" placeholder="Titre de la tâche…" />
            <input class="form-input" type="text" id="new-task-desc"  placeholder="Description courte (optionnel)" />
            <div class="form-row">
              <select class="form-select" id="new-task-priority">
                <option value="haute">Priorité haute</option>
                <option value="moyenne" selected>Priorité moyenne</option>
                <option value="basse">Priorité basse</option>
              </select>
            </div>
            <div class="form-actions">
              <button class="btn btn-ghost" onclick="toggleAddForm()">Annuler</button>
              <button class="btn btn-primary" onclick="addPierreTask()">Ajouter</button>
            </div>
          </div>
        </div>
      </div>

    </div>

    <!-- ── Timeline ──────────────────────────────────────────── -->
    <div class="timeline-section">
      <div class="timeline-header">
        <div class="timeline-title">
          <div class="timeline-icon">📋</div>
          Journal d'activité
        </div>
        <button class="btn btn-ghost" style="font-size:12px" onclick="clearLog()">Effacer</button>
      </div>
      <div class="timeline-body" id="activity-log"></div>
    </div>
  </div>
</main>

<!-- ── Toast container ──────────────────────────────────────────── -->
<div id="toast-container"></div>

<!-- ── Import Modal ─────────────────────────────────────────────── -->
<div class="modal-overlay" id="import-modal">
  <div class="modal">
    <h3>Importer des données JSON</h3>
    <textarea id="import-json" placeholder='Collez votre JSON ici…'></textarea>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeImport()">Annuler</button>
      <button class="btn btn-primary" onclick="importJSON()">Importer</button>
    </div>
  </div>
</div>

<script>
  /* ── Utilities ──────────────────────────────────────────────── */
  const uid  = () => Math.random().toString(36).slice(2, 10);
  const fmt  = (d) => new Date(d).toLocaleDateString('fr-FR', { day:'2-digit', month:'short' });
  const fmtT = (d) => new Date(d).toLocaleTimeString('fr-FR', { hour:'2-digit', minute:'2-digit' });
  const now  = () => new Date().toISOString();

  function toast(msg, color = '#7c3aed') {
    const c = document.getElementById('toast-container');
    const t = document.createElement('div');
    t.className = 'toast';
    t.style.borderColor = color + '55';
    t.textContent = msg;
    c.prepend(t);
    setTimeout(() => t.remove(), 3200);
  }

  /* ── Data layer ─────────────────────────────────────────────── */
  const DEFAULT_DATA = {
    project: 'Kreator — Bootcamp Launch',
    jules: [
      { id: uid(), title: 'Configurer Telegram', desc: 'Bot Telegram opérationnel pour les notifications et alertes projet.', status: 'done', priority: 'haute', createdAt: '2026-03-01T09:00:00Z' },
      { id: uid(), title: 'Installer GitHub CLI', desc: 'gh CLI installé, authentifié et prêt pour les opérations Git.', status: 'done', priority: 'haute', createdAt: '2026-03-02T10:30:00Z' },
      { id: uid(), title: 'Créer VSL Kreator landing page', desc: 'Landing page de la Video Sales Letter — structure, copywriting et intégration.', status: 'active', priority: 'haute', createdAt: '2026-03-04T08:00:00Z' },
    ],
    pierre: [
      { id: uid(), title: 'Définir le pricing du Bootcamp Kreator', desc: 'Choisir les paliers tarifaires (early bird, standard, VIP) et justifier la valeur perçue.', status: 'pending', priority: 'haute', createdAt: '2026-03-03T14:00:00Z' },
      { id: uid(), title: 'Préparer le contenu vidéo VSL', desc: 'Script, tournage et montage de la vidéo de vente principale.', status: 'pending', priority: 'haute', createdAt: '2026-03-03T14:10:00Z' },
      { id: uid(), title: 'Créer le compte Stripe pour les paiements', desc: 'Compte Stripe activé, informations bancaires renseignées, webhooks configurés.', status: 'pending', priority: 'moyenne', createdAt: '2026-03-04T11:00:00Z' },
    ],
    log: [
      { id: uid(), actor: 'system', text: 'Dashboard initialisé pour le projet <strong>Kreator Bootcamp Launch</strong>.', ts: '2026-03-01T08:55:00Z' },
      { id: uid(), actor: 'jules', text: '<span class="tag-jules">Jules ⚡</span> a terminé : <strong>Configurer Telegram</strong>', ts: '2026-03-01T09:30:00Z' },
      { id: uid(), actor: 'jules', text: '<span class="tag-jules">Jules ⚡</span> a terminé : <strong>Installer GitHub CLI</strong>', ts: '2026-03-02T11:00:00Z' },
      { id: uid(), actor: 'jules', text: '<span class="tag-jules">Jules ⚡</span> a démarré : <strong>Créer VSL Kreator landing page</strong>', ts: '2026-03-04T08:05:00Z' },
      { id: uid(), actor: 'pierre', text: '<span class="tag-pierre">Pierre 👤</span> a ajouté : <strong>Définir le pricing du Bootcamp Kreator</strong>', ts: '2026-03-03T14:01:00Z' },
      { id: uid(), actor: 'pierre', text: '<span class="tag-pierre">Pierre 👤</span> a ajouté : <strong>Préparer le contenu vidéo VSL</strong>', ts: '2026-03-03T14:11:00Z' },
      { id: uid(), actor: 'pierre', text: '<span class="tag-pierre">Pierre 👤</span> a ajouté : <strong>Créer le compte Stripe pour les paiements</strong>', ts: '2026-03-04T11:02:00Z' },
    ]
  };

  function loadData() {
    try {
      const raw = localStorage.getItem('kreator_dashboard');
      return raw ? JSON.parse(raw) : JSON.parse(JSON.stringify(DEFAULT_DATA));
    } catch { return JSON.parse(JSON.stringify(DEFAULT_DATA)); }
  }

  function saveData() {
    localStorage.setItem('kreator_dashboard', JSON.stringify(state));
  }

  let state = loadData();

  /* ── Render ─────────────────────────────────────────────────── */
  function statusLabel(s) {
    if (s === 'done')    return { cls: 'done',    icon: '✅', label: 'Terminé' };
    if (s === 'active')  return { cls: 'active',  icon: '🔄', label: 'En cours' };
    return                      { cls: 'pending', icon: '⏳', label: 'En attente' };
  }

  function priorityCls(p) {
    if (p === 'haute')  return 'priority-high';
    if (p === 'basse')  return 'priority-low';
    return 'priority-medium';
  }

  function renderJules() {
    const el = document.getElementById('jules-tasks');
    const tasks = state.jules;
    document.getElementById('jules-count').textContent = tasks.length + ' tâche' + (tasks.length > 1 ? 's' : '');

    if (!tasks.length) {
      el.innerHTML = '<div class="empty-state"><div class="icon">🎉</div>Aucune tâche pour Jules</div>';
      return;
    }

    el.innerHTML = tasks.map(t => {
      const s = statusLabel(t.status);
      const pulseDot = t.status === 'active' ? '<div class="pulse-dot"></div>' : '';
      return `
        <div class="task-card status-${t.status}" id="task-${t.id}">
          <div class="task-top">
            <div class="task-info">
              <div class="task-title">${escHtml(t.title)}</div>
              ${t.desc ? `<div class="task-desc">${escHtml(t.desc)}</div>` : ''}
            </div>
          </div>
          <div class="task-footer">
            <div class="task-status ${s.cls}">${pulseDot}${s.icon} ${s.label}</div>
            <div class="task-priority ${priorityCls(t.priority)}">${t.priority}</div>
            <div class="task-date">${fmt(t.createdAt)}</div>
          </div>
        </div>`;
    }).join('');
  }

  function renderPierre() {
    const container = document.getElementById('pierre-tasks');
    const tasks = state.pierre;
    document.getElementById('pierre-count').textContent = tasks.length + ' tâche' + (tasks.length > 1 ? 's' : '');

    // Keep the add form + button at the top
    const formHTML = container.innerHTML.includes('add-task-form')
      ? ''  // will be rebuilt below fully
      : '';

    const taskCards = tasks.map(t => {
      const s = statusLabel(t.status);
      const checked = t.status === 'done' ? 'checked' : '';
      return `
        <div class="task-card status-${t.status}" id="task-${t.id}">
          <div class="task-top">
            <input type="checkbox" class="task-checkbox" ${checked}
              onchange="togglePierreTask('${t.id}', this.checked)" />
            <div class="task-info">
              <div class="task-title">${escHtml(t.title)}</div>
              ${t.desc ? `<div class="task-desc">${escHtml(t.desc)}</div>` : ''}
            </div>
          </div>
          <div class="task-footer">
            <div class="task-status ${s.cls}">${s.icon} ${s.label}</div>
            <div class="task-priority ${priorityCls(t.priority)}">${t.priority}</div>
            <div class="task-date">${fmt(t.createdAt)}</div>
            <button onclick="deletePierreTask('${t.id}')"
              style="margin-left:auto;background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:13px;padding:0 2px;transition:var(--transition)"
              onmouseover="this.style.color='var(--red)'"
              onmouseout="this.style.color='var(--text-muted)'"
              title="Supprimer">✕</button>
          </div>
        </div>`;
    }).join('');

    container.innerHTML = `
      <button class="add-task-btn" onclick="toggleAddForm()">
        <span style="font-size:16px">＋</span> Ajouter une tâche
      </button>
      <div class="add-task-form" id="add-task-form">
        <input class="form-input" type="text" id="new-task-title" placeholder="Titre de la tâche…" />
        <input class="form-input" type="text" id="new-task-desc"  placeholder="Description courte (optionnel)" />
        <div class="form-row">
          <select class="form-select" id="new-task-priority">
            <option value="haute">Priorité haute</option>
            <option value="moyenne" selected>Priorité moyenne</option>
            <option value="basse">Priorité basse</option>
          </select>
        </div>
        <div class="form-actions">
          <button class="btn btn-ghost" onclick="toggleAddForm()">Annuler</button>
          <button class="btn btn-primary" onclick="addPierreTask()">Ajouter</button>
        </div>
      </div>
      ${taskCards}`;
  }

  function renderLog() {
    const el = document.getElementById('activity-log');
    const entries = [...state.log].reverse();

    if (!entries.length) {
      el.innerHTML = '<div class="empty-state"><div class="icon">📭</div>Aucune activité enregistrée</div>';
      return;
    }

    el.innerHTML = entries.map(e => {
      const avatarCls = e.actor;
      const avatarIcon = e.actor === 'jules' ? '⚡' : e.actor === 'pierre' ? '👤' : '⚙';
      return `
        <div class="log-entry">
          <div class="log-avatar ${avatarCls}">${avatarIcon}</div>
          <div class="log-content">
            <div class="log-text">${e.text}</div>
            <div class="log-time">${fmt(e.ts)} à ${fmtT(e.ts)}</div>
          </div>
        </div>`;
    }).join('');
  }

  function renderStats() {
    const all   = [...state.jules, ...state.pierre];
    const done  = all.filter(t => t.status === 'done').length;
    const active = all.filter(t => t.status === 'active').length;
    const pct   = all.length ? Math.round(done / all.length * 100) : 0;

    document.getElementById('stat-total').textContent  = all.length;
    document.getElementById('stat-active').textContent = active;
    document.getElementById('stat-done').textContent   = done;
    document.getElementById('stat-percent').textContent= pct + '%';
    document.getElementById('progress-bar').style.width = pct + '%';
  }

  function render() {
    renderJules();
    renderPierre();
    renderLog();
    renderStats();
  }

  /* ── Interactions ───────────────────────────────────────────── */
  function toggleAddForm() {
    const form = document.getElementById('add-task-form');
    if (!form) return;
    form.classList.toggle('open');
    if (form.classList.contains('open')) {
      document.getElementById('new-task-title').focus();
    }
  }

  function addPierreTask() {
    const titleEl = document.getElementById('new-task-title');
    const descEl  = document.getElementById('new-task-desc');
    const prioEl  = document.getElementById('new-task-priority');
    const title   = titleEl.value.trim();

    if (!title) { titleEl.focus(); titleEl.style.borderColor = 'var(--red)'; setTimeout(() => titleEl.style.borderColor = '', 1200); return; }

    const task = {
      id: uid(),
      title,
      desc: descEl.value.trim(),
      status: 'pending',
      priority: prioEl.value,
      createdAt: now()
    };

    state.pierre.push(task);
    addLog('pierre', `<span class="tag-pierre">Pierre 👤</span> a ajouté : <strong>${escHtml(title)}</strong>`);
    saveData();
    render();
    toast('Tâche ajoutée ✓', '#06b6d4');
  }

  function togglePierreTask(id, checked) {
    const task = state.pierre.find(t => t.id === id);
    if (!task) return;
    const prev = task.status;
    task.status = checked ? 'done' : 'pending';

    if (task.status !== prev) {
      const action = checked ? 'a terminé' : 'a réactivé';
      addLog('pierre', `<span class="tag-pierre">Pierre 👤</span> ${action} : <strong>${escHtml(task.title)}</strong>`);
      saveData();
      render();
      if (checked) toast('Tâche terminée ! 🎉', '#10b981');
    }
  }

  function deletePierreTask(id) {
    const idx = state.pierre.findIndex(t => t.id === id);
    if (idx === -1) return;
    const title = state.pierre[idx].title;
    state.pierre.splice(idx, 1);
    addLog('pierre', `<span class="tag-pierre">Pierre 👤</span> a supprimé : <strong>${escHtml(title)}</strong>`);
    saveData();
    render();
    toast('Tâche supprimée', '#64748b');
  }

  function addLog(actor, text) {
    state.log.push({ id: uid(), actor, text, ts: now() });
  }

  function clearLog() {
    if (!confirm('Effacer le journal d\'activité ?')) return;
    state.log = [];
    saveData();
    render();
    toast('Journal effacé', '#64748b');
  }

  /* ── Import / Export ────────────────────────────────────────── */
  function exportJSON() {
    const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href     = url;
    a.download = 'kreator-dashboard-' + new Date().toISOString().slice(0,10) + '.json';
    a.click();
    URL.revokeObjectURL(url);
    toast('Export JSON téléchargé ⬇', '#7c3aed');
  }

  function openImport() {
    document.getElementById('import-modal').classList.add('open');
    document.getElementById('import-json').value = '';
    document.getElementById('import-json').focus();
  }

  function closeImport() {
    document.getElementById('import-modal').classList.remove('open');
  }

  function importJSON() {
    try {
      const raw = document.getElementById('import-json').value.trim();
      const data = JSON.parse(raw);
      if (!data.jules || !data.pierre) throw new Error('Format invalide');
      state = data;
      saveData();
      render();
      closeImport();
      toast('Données importées avec succès ✓', '#10b981');
    } catch(e) {
      toast('JSON invalide : ' + e.message, '#ef4444');
    }
  }

  /* ── Security helper ────────────────────────────────────────── */
  function escHtml(str) {
    return String(str)
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;')
      .replace(/'/g,'&#39;');
  }

  /* ── Init ───────────────────────────────────────────────────── */
  document.getElementById('today-date').textContent =
    new Date().toLocaleDateString('fr-FR', { weekday:'long', day:'numeric', month:'long', year:'numeric' });

  // Close import modal on overlay click
  document.getElementById('import-modal').addEventListener('click', function(e) {
    if (e.target === this) closeImport();
  });

  // Enter key in add form
  document.addEventListener('keydown', function(e) {
    const form = document.getElementById('add-task-form');
    if (form && form.classList.contains('open') && e.key === 'Enter' && !e.shiftKey) {
      const focused = document.activeElement;
      if (focused && (focused.id === 'new-task-title' || focused.id === 'new-task-desc')) {
        addPierreTask();
      }
    }
    if (e.key === 'Escape') {
      closeImport();
      const form = document.getElementById('add-task-form');
      if (form) form.classList.remove('open');
    }
  });

  render();
</script>
</body>
</html>
